services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://flexdocs:flexdocs@db:5432/flexdocs
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3000
      - WEB_DIR=./public
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=flexdocs
      - POSTGRES_PASSWORD=flexdocs
      - POSTGRES_DB=flexdocs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flexdocs"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  init:
    build:
      context: .
      dockerfile: Dockerfile.init
    environment:
      - DATABASE_URL=postgresql://flexdocs:flexdocs@db:5432/flexdocs
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
